<!DOCTYPE html>
<!--
  WHEELIE WARS — Joust, but with cars doing wheelies. Gravity pulls you
  down. Hold thrust to rev upward. Land on TOP of your opponent's car to
  destroy them. Hit from the side and you just bounce off. First to lose
  3 lives loses.

  Player 1 (blue):  A / D to drive  ·  W to thrust up (wheelie!)
  Player 2 (gold):  ← / → to drive  ·  ↑ to thrust up
  Enter: start   ·   R: reset
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WHEELIE WARS</title>
<style>
  html, body { margin:0; height:100%; background:#050510; color:#f0f0f0;
    display:flex; align-items:center; justify-content:center;
    font-family:Consolas,"Courier New",monospace; }
  canvas { image-rendering:pixelated; box-shadow:0 0 40px rgba(64,140,255,0.25);
    max-width:100vw; max-height:100vh; border-radius:6px; }
  a.back { position:fixed; top:14px; left:16px; color:#8890a8; text-decoration:none;
    font-size:.8rem; letter-spacing:.15em; }
  a.back:hover { color:#408cff; }
</style>
</head>
<body>
<a class="back" href="../index.html">◂ ARCADE</a>
<canvas id="game"></canvas>
<script>
"use strict";

const WIDTH = 800, HEIGHT = 560, HUD_H = 64;
const PLAY_H = HEIGHT - HUD_H;
const GRAVITY = 560;
const THRUST = 680;
const DRIVE_SPEED = 280;
const DRAG = 0.92;           // horizontal drag per frame @ 60fps
const CAR_W = 48, CAR_H = 22;
const WIN_LIVES = 3;
const RESPAWN_TIME = 2.0;
const P1_COLOR = "#3da0ff", P2_COLOR = "#ffe81f";

// Platforms: [x, y, w] (y is TOP of platform)
const PLATFORMS = [
  [0,         HEIGHT - 20, WIDTH],        // floor
  [120,       HUD_H + PLAY_H*0.65, 160],
  [WIDTH-280, HUD_H + PLAY_H*0.65, 160],
  [WIDTH/2-80,HUD_H + PLAY_H*0.38, 160],
  [30,        HUD_H + PLAY_H*0.3,   90],
  [WIDTH-120, HUD_H + PLAY_H*0.3,   90],
];

const canvas = document.getElementById("game");
canvas.width = WIDTH; canvas.height = HEIGHT;
const ctx = canvas.getContext("2d");

let audioCtx = null;
function beep(freq, dur, type) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type||"square"; o.frequency.value = freq;
    o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.09, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

const STATE = { TITLE:0, PLAY:1, MATCH_OVER:2 };
let state = STATE.TITLE, cars, lives;
let explode = [];

const keys = {};
window.addEventListener("keydown", e => {
  keys[e.key] = true;
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) e.preventDefault();
  if (e.key === "Enter" && state !== STATE.PLAY) resetMatch();
  if (e.key === "r" || e.key === "R") state = STATE.TITLE;
});
window.addEventListener("keyup", e => { keys[e.key] = false; });

function makeCar(x, y, color, glow, label) {
  return { x, y, vx:0, vy:0, onGround:false, facing:1,
           color, glow, label, alive:true, respawnTimer:0 };
}

function resetMatch() {
  lives = [WIN_LIVES, WIN_LIVES];
  spawnCars();
  explode = [];
  state = STATE.PLAY;
}

function spawnCars() {
  cars = [
    makeCar(160, HEIGHT - 20 - CAR_H, P1_COLOR, "rgba(61,160,255,0.9)", "BLUE"),
    makeCar(WIDTH - 160 - CAR_W, HEIGHT - 20 - CAR_H, P2_COLOR, "rgba(255,232,31,0.9)", "GOLD"),
  ];
}

function landedOnTop(attacker, victim) {
  // attacker's bottom overlaps victim's top, and centers roughly aligned
  const aBtm = attacker.y + CAR_H;
  const vTop = victim.y;
  const overlapY = aBtm > vTop && aBtm < victim.y + CAR_H * 0.4;
  const overlapX = attacker.x + CAR_W > victim.x + 4 && attacker.x < victim.x + CAR_W - 4;
  return overlapY && overlapX && attacker.vy > 0;
}

function addExplosion(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const ang = (i / 12) * Math.PI * 2;
    const spd = 80 + Math.random() * 160;
    explode.push({ x, y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd,
                   color, life: 0.8 + Math.random()*0.4 });
  }
}

function killCar(idx) {
  const c = cars[idx];
  addExplosion(c.x + CAR_W/2, c.y + CAR_H/2, c.color);
  beep(200, 0.4, "sawtooth");
  c.alive = false;
  c.respawnTimer = RESPAWN_TIME;
  lives[idx]--;
  if (lives[idx] <= 0) { state = STATE.MATCH_OVER; }
}

let lastTs = null;
function update(ts) {
  if (lastTs === null) { lastTs = ts; return; }
  const dt = Math.min((ts-lastTs)/1000, 0.05);
  lastTs = ts;
  if (state !== STATE.PLAY) return;

  // explosion particles
  for (const p of explode) {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += GRAVITY * 0.3 * dt;
    p.life -= dt * 1.2;
  }
  explode = explode.filter(p => p.life > 0);

  for (let i = 0; i < 2; i++) {
    const c = cars[i];
    if (!c.alive) {
      c.respawnTimer -= dt;
      if (c.respawnTimer <= 0) {
        c.x = i===0 ? 160 : WIDTH - 160 - CAR_W;
        c.y = HEIGHT - 60;
        c.vx = 0; c.vy = 0;
        c.alive = true;
      }
      continue;
    }

    const left  = i===0 ? (keys.a||keys.A) : keys.ArrowLeft;
    const right = i===0 ? (keys.d||keys.D) : keys.ArrowRight;
    const up    = i===0 ? (keys.w||keys.W) : keys.ArrowUp;

    if (left)  { c.vx -= DRIVE_SPEED * dt; c.facing = -1; }
    if (right) { c.vx += DRIVE_SPEED * dt; c.facing =  1; }
    if (up)    { c.vy -= THRUST * dt; }

    c.vy += GRAVITY * dt;
    c.vx *= Math.pow(DRAG, dt * 60);

    c.x += c.vx * dt;
    c.y += c.vy * dt;

    // wrap horizontally
    if (c.x + CAR_W < 0) c.x = WIDTH;
    if (c.x > WIDTH) c.x = -CAR_W;
    // ceiling
    if (c.y < HUD_H) { c.y = HUD_H; c.vy = Math.abs(c.vy) * 0.4; }

    // platform collisions
    c.onGround = false;
    for (const [px, py, pw] of PLATFORMS) {
      const prevBottom = c.y + CAR_H - c.vy * dt;
      const bottom = c.y + CAR_H;
      if (c.vy >= 0 && prevBottom <= py && bottom >= py &&
          c.x + CAR_W > px + 4 && c.x < px + pw - 4) {
        c.y = py - CAR_H;
        c.vy = 0;
        c.onGround = true;
        break;
      }
    }
  }

  // collision detection between cars
  for (let a = 0; a < 2; a++) {
    const b = 1-a;
    if (!cars[a].alive || !cars[b].alive) continue;
    if (landedOnTop(cars[a], cars[b])) {
      cars[a].vy = -320; // bounce attacker up
      beep(880, 0.1, "square");
      killCar(b);
      if (state !== STATE.PLAY) return;
    } else {
      // side collision: push apart
      const overlapX = cars[a].x < cars[b].x + CAR_W && cars[a].x + CAR_W > cars[b].x;
      const overlapY = cars[a].y < cars[b].y + CAR_H && cars[a].y + CAR_H > cars[b].y;
      if (overlapX && overlapY) {
        const push = cars[a].x < cars[b].x ? -80 : 80;
        cars[a].vx += push; cars[b].vx -= push;
        beep(300, 0.06, "square");
      }
    }
  }
}

function drawCar(c) {
  if (!c.alive) return;
  ctx.shadowColor = c.glow; ctx.shadowBlur = 20;

  // body
  ctx.fillStyle = c.color;
  ctx.fillRect(c.x, c.y, CAR_W, CAR_H);

  // windscreen
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  const wx = c.facing > 0 ? c.x + CAR_W - 22 : c.x + 6;
  ctx.fillRect(wx, c.y + 3, 14, CAR_H - 8);

  // spoiler
  ctx.fillStyle = c.color;
  const sx = c.facing > 0 ? c.x : c.x + CAR_W - 3;
  ctx.fillRect(sx, c.y - 7, 3, 10);

  // wheels
  ctx.fillStyle = "#222";
  for (const wx2 of [c.x + 8, c.x + CAR_W - 14]) {
    ctx.beginPath(); ctx.arc(wx2 + 4, c.y + CAR_H + 2, 7, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = "#555"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(wx2 + 4, c.y + CAR_H + 2, 4, 0, Math.PI*2); ctx.stroke();
  }

  // thrust flame
  if (!c.onGround && c.vy < 0) {
    ctx.shadowColor = "#ff8800"; ctx.shadowBlur = 12;
    ctx.fillStyle = `rgba(255,${100+Math.random()*80|0},0,0.85)`;
    const fx = c.x + CAR_W/2 - 6;
    ctx.beginPath();
    ctx.moveTo(fx, c.y + CAR_H + 4);
    ctx.lineTo(fx + 12, c.y + CAR_H + 4);
    ctx.lineTo(fx + 6, c.y + CAR_H + 18 + Math.random()*10);
    ctx.fill();
  }

  ctx.shadowBlur = 0;

  // label
  ctx.fillStyle = c.color; ctx.font = "bold 9px Consolas,monospace";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(c.label, c.x + CAR_W/2, c.y + CAR_H/2);
}

function render() {
  ctx.fillStyle = "#050510";
  ctx.fillRect(0, 0, WIDTH, HEIGHT);
  // night sky bg
  ctx.fillStyle = "#06060f";
  ctx.fillRect(0, HUD_H, WIDTH, PLAY_H);

  // platforms
  for (const [px, py, pw] of PLATFORMS) {
    ctx.shadowColor = "rgba(64,140,255,0.4)"; ctx.shadowBlur = 10;
    ctx.fillStyle = "#1a1a3a";
    ctx.fillRect(px, py, pw, HEIGHT);
    ctx.fillStyle = "rgba(64,140,255,0.6)";
    ctx.fillRect(px, py, pw, 4);
    ctx.shadowBlur = 0;
  }

  // explosion particles
  for (const p of explode) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // draw cars
  for (const c of (cars||[])) {
    if (!c.alive && c.respawnTimer > 0) {
      // ghost while respawning
      ctx.globalAlpha = 0.3 + 0.3 * Math.sin(c.respawnTimer * 8);
      ctx.fillStyle = c.color; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.font = "bold 14px Consolas,monospace";
      ctx.fillText("RESPAWN " + Math.ceil(c.respawnTimer)+"s",
        c.x + CAR_W/2, HUD_H + PLAY_H/2);
      ctx.globalAlpha = 1;
    }
    drawCar(c);
  }

  // HUD
  ctx.fillStyle = "#050510"; ctx.fillRect(0, 0, WIDTH, HUD_H);
  ctx.textBaseline = "middle";
  ctx.font = "bold 14px Consolas,monospace";
  // lives
  ctx.textAlign = "left"; ctx.fillStyle = P1_COLOR;
  ctx.fillText((lives??"[0,0]")[0] !== undefined ? "♥".repeat(lives[0]) : "", 24, HUD_H/2);
  ctx.font = "10px Consolas,monospace"; ctx.fillText("BLUE · A/D + W", 24 + 54, HUD_H/2);
  ctx.font = "bold 14px Consolas,monospace";
  ctx.textAlign = "right"; ctx.fillStyle = P2_COLOR;
  ctx.fillText(lives ? "♥".repeat(lives[1]) : "", WIDTH-24, HUD_H/2);
  ctx.font = "10px Consolas,monospace"; ctx.fillText("← / → + ↑ · GOLD", WIDTH-24-54, HUD_H/2);
  ctx.textAlign = "center"; ctx.fillStyle = "#8890a8"; ctx.font = "11px Consolas,monospace";
  ctx.fillText("LAND ON TOP TO DESTROY", WIDTH/2, HUD_H/2);

  if (state === STATE.TITLE || !cars) {
    showOverlay([
      {text:"WHEELIE WARS", color:P2_COLOR, font:"bold 48px Consolas,monospace", gap:60},
      {text:"Joust but with cars. Thrust up, land on your rival to destroy them.", color:"#8890a8", font:"13px Consolas,monospace", gap:48},
      {text:"BLUE: A/D drive · W thrust     GOLD: ←/→ drive · ↑ thrust", color:"#f0f0f0", font:"13px Consolas,monospace", gap:50},
      {text:"PRESS ENTER", color:P1_COLOR, font:"bold 22px Consolas,monospace"},
    ]);
  } else if (state === STATE.MATCH_OVER) {
    const w = (lives&&lives[0]>0)?"BLUE WINS":"GOLD WINS";
    const c = (lives&&lives[0]>0)?P1_COLOR:P2_COLOR;
    showOverlay([
      {text:w, color:c, font:"bold 52px Consolas,monospace", gap:64},
      {text:"PRESS ENTER TO PLAY AGAIN", color:"#8890a8", font:"14px Consolas,monospace"},
    ]);
  }
}

function showOverlay(lines) {
  ctx.fillStyle = "rgba(5,5,16,0.78)";
  ctx.fillRect(0, HUD_H, WIDTH, PLAY_H);
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  let y = HUD_H + PLAY_H/2 - (lines.length-1)*24;
  for (const ln of lines) {
    ctx.fillStyle = ln.color||"#f0f0f0"; ctx.font = ln.font||"18px Consolas,monospace";
    ctx.fillText(ln.text, WIDTH/2, y); y += ln.gap||46;
  }
}

function loop(ts) { update(ts); render(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
</script>
</body>
</html>
