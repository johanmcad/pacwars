<!DOCTYPE html>
<!--
  PONG — a 1-vs-1 classic for two players on one keyboard.

  First to 7 points wins.

  Player 1 (blue, left):  W / S
  Player 2 (gold, right): Arrow Up / Arrow Down
  Enter: start / next round   ·   R: reset match
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PONG</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #050510;
    color: #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Consolas, "Courier New", monospace;
  }
  canvas {
    image-rendering: pixelated;
    box-shadow: 0 0 40px rgba(64, 140, 255, 0.25);
    max-width: 100vw;
    max-height: 100vh;
    border-radius: 6px;
  }
  a.back {
    position: fixed;
    top: 14px; left: 16px;
    color: #8890a8;
    text-decoration: none;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
  }
  a.back:hover { color: #408cff; }
</style>
</head>
<body>
<a class="back" href="../index.html">◂ ARCADE</a>
<canvas id="game"></canvas>
<script>
"use strict";

// ---------------------------------------------------------------- constants
const WIDTH  = 800;
const HEIGHT = 560;
const HUD_H  = 64;
const PLAY_H = HEIGHT - HUD_H;

const PAD_W  = 14;
const PAD_H  = 90;
const PAD_SPEED = 420;   // px/s
const BALL_START = 320;  // px/s
const BALL_MAX   = 780;  // px/s — speed cap
const SPEED_BUMP = 1.07; // multiplier per paddle hit
const WIN_SCORE  = 7;
const PAD_MARGIN = 28;   // from each side wall

const P1_COLOR = "#3da0ff";
const P2_COLOR = "#ffe81f";
const BALL_COLOR = "#ffffff";
const GLOW_BLUE = "rgba(61,160,255,0.9)";
const GLOW_GOLD = "rgba(255,232,31,0.9)";

// ---------------------------------------------------------------- canvas
const canvas = document.getElementById("game");
canvas.width  = WIDTH;
canvas.height = HEIGHT;
const ctx = canvas.getContext("2d");

// ---------------------------------------------------------------- sound
let audio = null;
function beep(freq, dur, type) {
  try {
    if (!audio) audio = new (window.AudioContext || window.webkitAudioContext)();
    const o = audio.createOscillator(), g = audio.createGain();
    o.type = type || "square";
    o.frequency.value = freq;
    o.connect(g); g.connect(audio.destination);
    g.gain.setValueAtTime(0.08, audio.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + dur);
    o.start(); o.stop(audio.currentTime + dur);
  } catch (e) { /* audio optional */ }
}

// ---------------------------------------------------------------- state
const STATE = { TITLE: 0, PLAY: 1, POINT: 2, MATCH_OVER: 3 };
let state = STATE.TITLE;
let scores = [0, 0];
let pads, ball;
let pointMsg = "";

const keys = {};
window.addEventListener("keydown", e => {
  keys[e.key] = true;
  if (["ArrowUp", "ArrowDown", " "].includes(e.key)) e.preventDefault();
  if (e.key === "Enter") {
    if (state === STATE.TITLE || state === STATE.MATCH_OVER) resetMatch();
    else if (state === STATE.POINT) serve();
  }
  if (e.key === "r" || e.key === "R") { state = STATE.TITLE; }
});
window.addEventListener("keyup", e => { keys[e.key] = false; });

function makePad(x, color, glow) {
  return { x, y: HUD_H + PLAY_H / 2 - PAD_H / 2, color, glow };
}

function launchBall(towardPlayer) {
  // aim at the receiving player with a random vertical angle
  const angle = (Math.random() * 0.55 + 0.1) * (Math.random() < 0.5 ? 1 : -1);
  const dir = towardPlayer === 0 ? -1 : 1;
  ball = {
    x: WIDTH / 2,
    y: HUD_H + PLAY_H / 2,
    vx: dir * BALL_START * Math.cos(angle),
    vy: BALL_START * Math.sin(angle),
    speed: BALL_START,
    r: 8,
  };
}

function serve() {
  launchBall(Math.random() < 0.5 ? 0 : 1);
  state = STATE.PLAY;
}

function resetMatch() {
  scores = [0, 0];
  pads = [
    makePad(PAD_MARGIN,           P1_COLOR, GLOW_BLUE),
    makePad(WIDTH - PAD_MARGIN - PAD_W, P2_COLOR, GLOW_GOLD),
  ];
  state = STATE.POINT;
  pointMsg = "";
  serve();
}

// ---------------------------------------------------------------- update
let lastTs = null;
function update(ts) {
  if (lastTs === null) { lastTs = ts; return; }
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  if (state !== STATE.PLAY) return;

  // move pads
  if ((keys["w"] || keys["W"]) && pads[0].y > HUD_H)
    pads[0].y -= PAD_SPEED * dt;
  if ((keys["s"] || keys["S"]) && pads[0].y + PAD_H < HEIGHT)
    pads[0].y += PAD_SPEED * dt;
  if (keys["ArrowUp"]   && pads[1].y > HUD_H)
    pads[1].y -= PAD_SPEED * dt;
  if (keys["ArrowDown"] && pads[1].y + PAD_H < HEIGHT)
    pads[1].y += PAD_SPEED * dt;

  // move ball
  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;

  // top / bottom bounce
  if (ball.y - ball.r < HUD_H) {
    ball.y = HUD_H + ball.r;
    ball.vy = Math.abs(ball.vy);
    beep(440, 0.05);
  } else if (ball.y + ball.r > HEIGHT) {
    ball.y = HEIGHT - ball.r;
    ball.vy = -Math.abs(ball.vy);
    beep(440, 0.05);
  }

  // paddle collision helper
  function hitPad(pad, side) {
    const inX = side === "left"
      ? ball.x - ball.r <= pad.x + PAD_W && ball.x + ball.r >= pad.x && ball.vx < 0
      : ball.x + ball.r >= pad.x          && ball.x - ball.r <= pad.x + PAD_W && ball.vx > 0;
    if (!inX) return false;
    const hit = ball.y + ball.r >= pad.y && ball.y - ball.r <= pad.y + PAD_H;
    if (!hit) return false;

    // reflect x, add english based on where ball hit the paddle face
    const rel = (ball.y - (pad.y + PAD_H / 2)) / (PAD_H / 2);   // -1..1
    const maxAngle = Math.PI / 3.5;
    const angle = rel * maxAngle;
    ball.speed = Math.min(ball.speed * SPEED_BUMP, BALL_MAX);
    ball.vx = (side === "left" ? 1 : -1) * ball.speed * Math.cos(angle);
    ball.vy = ball.speed * Math.sin(angle);
    // clamp ball outside pad
    if (side === "left") ball.x = pad.x + PAD_W + ball.r + 1;
    else                 ball.x = pad.x - ball.r - 1;
    beep(side === "left" ? 330 : 370, 0.07, "square");
    return true;
  }
  hitPad(pads[0], "left");
  hitPad(pads[1], "right");

  // scoring
  if (ball.x + ball.r < 0) {
    scores[1]++;
    beep(120, 0.4, "sawtooth");
    endPoint(1);
  } else if (ball.x - ball.r > WIDTH) {
    scores[0]++;
    beep(120, 0.4, "sawtooth");
    endPoint(0);
  }
}

function endPoint(scorer) {
  if (scores[scorer] >= WIN_SCORE) {
    state = STATE.MATCH_OVER;
  } else {
    pointMsg = scorer === 0 ? "BLUE SCORES" : "GOLD SCORES";
    state = STATE.POINT;
    launchBall(1 - scorer);   // serve to the team who lost the point
    serve();
  }
}

// ---------------------------------------------------------------- render helpers
function glowRect(x, y, w, h, color, glow, blur) {
  ctx.shadowColor = glow;
  ctx.shadowBlur  = blur || 18;
  ctx.fillStyle   = color;
  ctx.fillRect(x, y, w, h);
  ctx.shadowBlur  = 0;
}

function glowCircle(x, y, r, color, glow, blur) {
  ctx.shadowColor = glow;
  ctx.shadowBlur  = blur || 20;
  ctx.fillStyle   = color;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur  = 0;
}

function drawDivider() {
  ctx.setLineDash([12, 10]);
  ctx.strokeStyle = "rgba(64,140,255,0.15)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(WIDTH / 2, HUD_H);
  ctx.lineTo(WIDTH / 2, HEIGHT);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawHUD() {
  ctx.fillStyle = "#050510";
  ctx.fillRect(0, 0, WIDTH, HUD_H);

  ctx.textBaseline = "middle";
  ctx.font = "bold 32px Consolas, monospace";

  ctx.textAlign = "left";
  ctx.fillStyle = P1_COLOR;
  ctx.fillText(scores[0], 28, HUD_H / 2);
  ctx.font = "11px Consolas, monospace";
  ctx.fillText("BLUE · W / S", 68, HUD_H / 2);

  ctx.font = "bold 32px Consolas, monospace";
  ctx.textAlign = "right";
  ctx.fillStyle = P2_COLOR;
  ctx.fillText(scores[1], WIDTH - 28, HUD_H / 2);
  ctx.font = "11px Consolas, monospace";
  ctx.fillText("ARROWS · GOLD", WIDTH - 68, HUD_H / 2);

  ctx.textAlign = "center";
  ctx.fillStyle = "#8890a8";
  ctx.font = "11px Consolas, monospace";
  ctx.fillText("FIRST TO " + WIN_SCORE, WIDTH / 2, HUD_H / 2);
}

function centerOverlay(lines) {
  ctx.fillStyle = "rgba(5,5,16,0.7)";
  ctx.fillRect(0, HUD_H, WIDTH, PLAY_H);
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  let y = HUD_H + PLAY_H / 2 - (lines.length - 1) * 26;
  for (const ln of lines) {
    ctx.shadowColor = ln.color || "#fff";
    ctx.shadowBlur = 12;
    ctx.fillStyle = ln.color || "#f0f0f0";
    ctx.font = ln.font || "20px Consolas, monospace";
    ctx.fillText(ln.text, WIDTH / 2, y);
    ctx.shadowBlur = 0;
    y += ln.gap || 50;
  }
}

function render() {
  // background
  ctx.fillStyle = "#08081c";
  ctx.fillRect(0, HUD_H, WIDTH, PLAY_H);
  drawDivider();
  drawHUD();

  if (!pads) return;

  // pads
  for (const p of pads) glowRect(p.x, p.y, PAD_W, PAD_H, p.color, p.glow);

  // ball
  if (ball) glowCircle(ball.x, ball.y, ball.r, BALL_COLOR, "rgba(255,255,255,0.9)");

  // overlays
  if (state === STATE.TITLE) {
    centerOverlay([
      { text: "PONG", color: P2_COLOR, font: "bold 72px Consolas, monospace", gap: 72 },
      { text: "BLUE: W / S          GOLD: ARROW KEYS", color: "#f0f0f0", font: "15px Consolas, monospace", gap: 50 },
      { text: "PRESS ENTER", color: P1_COLOR, font: "bold 22px Consolas, monospace" },
    ]);
  } else if (state === STATE.MATCH_OVER) {
    const winner = scores[0] > scores[1] ? "BLUE WINS" : "GOLD WINS";
    const col    = scores[0] > scores[1] ? P1_COLOR    : P2_COLOR;
    centerOverlay([
      { text: winner, color: col, font: "bold 52px Consolas, monospace", gap: 64 },
      { text: scores[0] + "  —  " + scores[1], color: "#f0f0f0", font: "28px Consolas, monospace", gap: 56 },
      { text: "PRESS ENTER TO PLAY AGAIN", color: "#8890a8", font: "15px Consolas, monospace" },
    ]);
  }
}

// ---------------------------------------------------------------- loop
function loop(ts) {
  update(ts);
  render();
  requestAnimationFrame(loop);
}

state = STATE.TITLE;
requestAnimationFrame(loop);
</script>
</body>
</html>
